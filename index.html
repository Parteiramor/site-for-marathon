<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Site For Marathon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .iframe-container {
            width: 100vw;
        }

        iframe {
            width: 100vw;
            display: block;
            margin: 0;
            padding: 0;
        }

        iframe[title="YouTube video player"] {
            height: 80vh;
        }

        iframe[title="weather-widget"] {
            height: 40vh;
        }
    </style>
</head>
<body>
<div class="iframe-container">
    <iframe src="https://www.youtube.com/embed/yLGfPNhtS2U?controls=0" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
</div>

<div class="iframe-container">
    <iframe title="weather-widget" src="https://www.meteoblue.com/en/weather/widget/daily/london_united-kingdom_2643743?geoloc=fixed&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&precipunit=MILLIMETER&days=7&coloured=coloured&pictoicon=1&maxtemperature=1&mintemperature=1&windspeed=1&windgust=0&winddirection=1&uv=0&humidity=0&precipitation=0&precipitationprobability=0&spot=0&pressure=0&layout=light&user_key=c1f59f91cd4495da&embed_key=14b46473a48a2f6b&sig=24dd4845f716f9ac403e01e9aa0d85c300c2fd87a1f6e22d7a28770c6bf84b71" frameborder="0" scrolling="NO" allowtransparency="true" sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox"></iframe>
    <!-- DO NOT REMOVE THIS LINK --><a href="https://www.meteoblue.com/en/weather/week/index" target="_blank" rel="noopener">meteoblue</a>
</div>

<div class="distance-container">
    <h2>Running Distances</h2>
    <ul>
        <li class="distance">
            <h2>1km Run</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Runners_JFK_Memorial_%28cropped%29.jpg" alt="1km Run">
            <p>This short and sweet 1km run...</p>
        </li>
        <li class="distance">
            <h2>5km Run</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Running_Man_Kyle_Cassidy.jpg" alt="5km Run">
            <p>With a distance of 5km...</p>
        </li>
        <li class="distance">
            <h2>10km Run</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Runners_JFK_Memorial_%28cropped%29.jpg" alt="10km Run">
            <p>The 10km run...</p>
        </li>
        <li class="distance">
            <h2>Half Marathon</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Running_Man_Kyle_Cassidy.jpg" alt="Half Marathon">
            <p>The half marathon...</p>
        </li>
        <li class="distance">
            <h2>Full Marathon</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Runners_JFK_Memorial_%28cropped%29.jpg" alt="Full Marathon">
            <p>The full marathon...</p>
        </li>
    </ul>
</div>
</body>
</html>
